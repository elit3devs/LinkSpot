<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IXL | Math, Language Arts, Science, Social Studies, and Spanish</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #050a0a;
      --bg-gradient: radial-gradient(circle at top right, #0d1a1a, #050a0a);
      --glass: rgba(255, 255, 255, 0.02);
      --glass-border: rgba(255, 255, 255, 0.08);
      --accent: #2E8B57;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --header-height: 52px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
      background: var(--bg-deep);
      background-image: var(--bg-gradient);
      color: var(--text);
      min-height: 100vh;
      width: 100vw;
      padding-top: 72px;
    }

    .ls-top-bar {
      height: 60px;
      width: 100%;
      background: #0a0a0a;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 9999;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
    }

    .ls-brand {
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: -0.5px;
      color: #fff;
      user-select: none;
      text-decoration: none;
    }

    .ls-nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .ls-nav-link {
      padding: 8px 16px;
      background: transparent;
      border: none;
      border-radius: 4px;
      color: #888;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      text-decoration: none;
    }

    .ls-nav-link:hover {
      background: #1a1a1a;
      color: #fff;
    }

    .ls-nav-link.active {
      background: var(--accent);
      color: #fff;
    }

    .apps-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .apps-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .apps-header h1 {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .apps-header p {
      color: var(--text-dim);
      font-size: 1rem;
    }

    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }

    .app-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      color: var(--text);
    }

    .app-card:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(52, 211, 153, 0.1);
    }

    .app-icon {
      width: 60px;
      height: 60px;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app-icon svg {
      width: 40px;
      height: 40px;
      fill: var(--accent);
    }

    .app-name {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 8px;
    }

    .app-category {
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    #view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-deep); display: none; flex-direction: column; z-index: 9999; }
    .bar { padding: 15px; background: #0a0f0f; display: flex; gap: 10px; border-bottom: 1px solid #2a3a3a; }
    .btn { background: #1a2626; border: 1px solid #2a3a3a; color: #fff; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 800; }
    .btn:hover { background: var(--accent); color: #000; }
    iframe { flex: 1; border: none; width: 100%; }

    @media (max-width: 768px) {
      .apps-header h1 { font-size: 1.5rem; }
      .apps-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .app-card { padding: 16px; }
      .app-icon svg { width: 32px; height: 32px; }
      .app-name { font-size: 0.9rem; }
      .app-category { font-size: 0.65rem; }
    }

    @media (max-width: 480px) {
      .apps-header h1 { font-size: 1.2rem; }
      .apps-header p { font-size: 0.8rem; }
      .apps-grid { grid-template-columns: 1fr; gap: 10px; }
      .app-card { padding: 12px; }
      .app-icon svg { width: 28px; height: 28px; }
      .app-name { font-size: 0.85rem; }
    }
  </style>
</head>

  <div id="view">
    <div class="bar">
      <button class="btn" onclick="cls()">CLOSE</button>
      <button class="btn" onclick="fs()">FULLSCREEN</button>
      <button class="btn" onclick="tab()">OPEN TAB</button>
      <select id="proxy-select" class="btn" onchange="changeProxy()">
        <option value="bare">Bare Server</option>
        <option value="scramjet">Scramjet</option>
        <option value="uv">Ultraviolet</option>
      </select>
    </div>
    <iframe id="f" src=""></iframe>
  </div>

  <script>
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.shiftKey && e.key === 'C') || (e.ctrlKey && e.key === 'U')) {
        e.preventDefault();
      }
    });
    setInterval(() => {
      const devtools = /./;
      devtools.toString = function() {
        window.location.href = 'https://google.com';
      };
      console.log('%cStop!', 'color: red; font-size: 50px; font-weight: bold;');
    }, 1000);

    const settings = JSON.parse(localStorage.getItem('linkspot_settings') || '{}');
    if (settings.accentColor) {
      document.documentElement.style.setProperty('--accent', settings.accentColor);
      document.documentElement.style.setProperty('--bg-gradient', `radial-gradient(circle at top right, ${settings.accentColor}33, #050a0a)`);
    }

    const cards = document.querySelectorAll('.app-card');
    const v = document.getElementById('view');
    const f = document.getElementById('f');

    let currentProxy = 'bare';
    let currentUrl = '';

    function changeProxy() {
      currentProxy = document.getElementById('proxy-select').value;
      if (currentUrl) {
        loadApp(currentUrl);
      }
    }

    function loadApp(url) {
      currentUrl = url;
      let finalUrl;
      if (currentProxy === 'bare') {
        finalUrl = "/" + url;
      } else if (currentProxy === 'scramjet') {
        finalUrl = "/scramjet/" + btoa(url);
      } else if (currentProxy === 'uv') {
        finalUrl = "/uv/" + btoa(url);
      }
      f.src = finalUrl;
      v.style.display = 'flex';
    }

    cards.forEach(card => {
      card.addEventListener('click', (e) => {
        e.preventDefault();
        const href = card.getAttribute('href');
        loadApp(href);
      });
    });

    function cls() { v.style.display = 'none'; f.src = ''; }
    function fs() { if(f.requestFullscreen) f.requestFullscreen(); }
    function tab() { if(f.src) window.open(f.src, '_blank'); }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(reg => {
        console.log('Service Worker registered');
      }).catch(err => {
        console.log('Service Worker registration failed');
      });
    }
  </script>
