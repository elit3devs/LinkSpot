<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IXL | Math, Language Arts, Science, Social Studies, and Spanish</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050a0a;
            --bg-gradient: radial-gradient(circle at top right, #0d1a1a, #050a0a);
            --accent: #2E8B57;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
            background: var(--bg-deep);
            background-image: var(--bg-gradient);
            color: var(--text);
            min-height: 100vh;
            width: 100vw;
            padding-top: 72px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .coming-soon-container {
            text-align: center;
            padding: 40px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2rem;
            color: var(--text-dim);
            margin-bottom: 10px;
        }

        .back-link {
            margin-top: 30px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .ls-top-bar {
          height: 60px;
          width: 100%;
          background: #0a0a0a;
          border-bottom: 1px solid #1a1a1a;
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 0 32px;
          z-index: 9999;
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
        }

        .ls-brand {
          font-weight: 700;
          font-size: 1.1rem;
          letter-spacing: -0.5px;
          color: #fff;
          user-select: none;
          margin-right: 40px;
          text-decoration: none;
        }

        .ls-nav-links {
          display: flex;
          align-items: center;
          gap: 4px;
        }

        .ls-nav-link {
          padding: 8px 16px;
          background: transparent;
          border: none;
          border-radius: 4px;
          color: #888;
          font-size: 0.85rem;
          font-weight: 500;
          cursor: pointer;
          transition: all 0.15s ease;
          text-decoration: none;
        }

        .ls-nav-link:hover {
          background: #1a1a1a;
          color: #fff;
        }

        .ls-nav-link.active {
          background: var(--accent);
          color: #fff;
        }


        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            p { font-size: 1rem; }
            .coming-soon-container { padding: 30px 20px; }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            p { font-size: 0.9rem; }
            .coming-soon-container { padding: 20px 15px; }
            .back-link { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
  <header class="ls-top-bar">
    <a href="/" class="ls-brand">Link Spot</a>
    <div class="ls-nav-links">
      <a href="/" class="ls-nav-link">Home</a>
      <a href="g" class="ls-nav-link">Games</a>
      <a href="a" class="ls-nav-link">Apps</a>
      <a href="s" class="ls-nav-link">Settings</a>
    </div>
  </header>


    <div class="coming-soon-container">
        <h1>AI Chat</h1>
        <p>AI Assistant Coming Soon</p>
        <p>Our AI chatbot is currently being developed. Check back later for updates!</p>
        <a href="/" class="back-link">← Back to Home</a>
    </div>

    <script>
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
        if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.shiftKey && e.key === 'C') || (e.ctrlKey && e.key === 'U')) {
            e.preventDefault();
        }
    });
    setInterval(() => {
        const devtools = /./;
        devtools.toString = function() {
            window.location.href = 'https://google.com';
        };
        console.log('%cStop!', 'color: red; font-size: 50px; font-weight: bold;');
    }, 1000);

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(reg => {
        console.log('Service Worker registered');
      }).catch(err => {
        console.log('Service Worker registration failed');
      });
    }
    </script>
</body>
</html>
