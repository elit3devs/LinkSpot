<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkSpot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --emerald: #10b981; --coal: #0a0a0a; --coal-alt: #050505; }
        body { font-family: 'JetBrains Mono', monospace; background-color: var(--coal); color: #e2e8f0; overflow: hidden; }
        .emerald-border { border: 1px solid rgba(16, 185, 129, 0.2); }
        .emerald-glow:focus-within { border-color: var(--emerald); box-shadow: 0 0 15px rgba(16, 185, 129, 0.1); }
        #log::-webkit-scrollbar { width: 4px; }
        #log::-webkit-scrollbar-thumb { background: var(--emerald); }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="px-8 py-6 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-4">
            <div class="h-8 w-8 bg-[var(--emerald)] flex items-center justify-center rounded-sm">
                <div class="h-4 w-4 bg-black"></div>
            </div>
            <span class="font-bold tracking-tighter text-xl uppercase italic">LinkSpot</span>
        </div>
        <div id="status" class="text-[10px] font-bold tracking-[0.3em] text-gray-500 uppercase">NODE ONLINE</div>
    </header>

    <main id="log" class="flex-1 overflow-y-auto p-6 md:p-12 space-y-6 max-w-5xl mx-auto w-full"></main>

    <div class="p-6 md:p-10 w-full max-w-5xl mx-auto">
        <div class="relative emerald-glow transition-all rounded-lg border border-white/10 bg-[var(--coal-alt)]">
            <textarea id="prompt" rows="2" 
                class="w-full bg-transparent border-none focus:ring-0 text-white p-5 pr-24 text-sm placeholder-gray-800"
                placeholder="Query LinkSpot..."></textarea>
            <button id="send" onclick="handle()" class="absolute right-4 bottom-4 text-[var(--emerald)] hover:scale-110 transition-transform font-bold">
                EXECUTE
            </button>
        </div>
    </div>

    <script>
        const log = document.getElementById('log');
        const input = document.getElementById('prompt');
        let history = [];

        async function handle() {
            const val = input.value.trim();
            if(!val) return;
            
            input.value = "";
            add(val, 'user');
            const aiMsg = add("...", 'node');
            
            history.push({role: "user", content: val});

            try {
                const response = await fetch("https://text.pollinations.ai/openai", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama",
                        messages: history
                    })
                });

                const data = await response.json();
                const text = data.choices[0].message.content;
                aiMsg.innerText = text;
                history.push({role: "assistant", content: text});
            } catch (e) {
                aiMsg.innerText = "Connection failed.";
                history.pop();
            }
        }

        function add(t, r) {
            const d = document.createElement('div');
            d.className = "emerald-border p-4 bg-[var(--coal-alt)] text-sm whitespace-pre-wrap";
            d.innerText = t;
            log.appendChild(d);
            log.scrollTop = log.scrollHeight;
            return d;
        }

        input.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handle(); } };
    </script>
</body>
</html>
